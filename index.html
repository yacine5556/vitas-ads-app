<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Ads Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://static.onclicka.com/js/onclicka.js"></script>
    <style>
        body { background-color: #0b0e11; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1c2128; padding: 25px; border-radius: 15px; text-align: center; width: 85%; }
        .balance { font-size: 35px; color: #ffcc00; font-weight: bold; margin: 20px 0; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-ad { background: linear-gradient(45deg, #ffcc00, #ffa500); color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <div>💰 Current Balance</div>
        <div class="balance">0.00</div>
        <button id="adBtn" class="btn btn-ad">Watch Ad for Reward 📺</button>
        <button class="btn">Withdraw 💸</button>
    </div>
    <script>
        onclicka('init', { zoneId: 436681 });
        document.getElementById('adBtn').onclick = function() {
            onclicka('show');
        };
    </script>
</body>
</html>
