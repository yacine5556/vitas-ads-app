<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Ads Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://static.onclicka.com/js/onclicka.js"></script>
    <style>
        body { background-color: #0b0e11; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; direction: rtl; }
        .container { background: #1c2128; padding: 20px; border-radius: 20px; text-align: center; width: 90%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #30363d; }
        .balance-value { font-size: 35px; font-weight: bold; color: #ffcc00; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-ad { background: #ffcc00; color: #000; }
        .section-title { width: 100%; text-align: right; color: #8b949e; font-size: 16px; margin-bottom: 10px; padding-right: 10px; }
        .task-card { background: #2d333b; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; width: 90%; margin-bottom: 15px; border: 1px solid #444c56; }
        .btn-task { background: #0088cc; color: #fff; width: auto; padding: 8px 18px; font-size: 14px; border-radius: 10px; border: none; }
        .btn-withdraw { background: #30363d; color: #8b949e; cursor: not-allowed; }
        .btn-withdraw.active { background: #238636; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 14px; color: #aaa;">رصيدك الحالي (بالدولار)</div>
        <div id="balance" class="balance-value">0.0000</div>
        <button id="adBtn" class="btn btn-ad">كسب المال من الإعلانات 📺</button>
    </div>

    <div class="section-title">المهام السريعة</div>
    <div class="task-card">
        <div style="text-align: right;">
            <div style="font-weight: bold;">متابعة قناة التليجرام</div>
            <div style="color: #4cd964; font-size: 13px;">+0.0012$ كاش</div>
        </div>
        <button onclick="doTask()" class="btn btn-task">انضمام</button>
    </div>

    <div class="section-title">سحب الأرباح</div>
    <div class="container">
        <p style="font-size: 13px; color: #8b949e; margin-bottom: 15px;">الحد الأدنى للسحب هو 2.00$</p>
        <button id="withdrawBtn" onclick="checkWithdraw()" class="btn btn-withdraw">طلب سحب الأرباح 💸</button>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('vitas_user_balance')) || 0;
        const targetWithdraw = 2.00;
        updateUI();

        const adConfig = { zoneId: 436685 };

        document.getElementById('adBtn').onclick = function() {
            if (window.onclicka) {
                window.onclicka('show', adConfig);
            } else {
                alert("الإعلان قيد التحضير من الموقع، يرجى الانتظار.");
            }
        };

        window.onclicka('onAdCompleted', () => {
            addBalance(0.0010);
        });

        // تم تحديث الرابط الجديد هنا
        function doTask() {
            const myChannel = 'https://t.me/fotgy';
            
            window.open(myChannel, '_blank');

            setTimeout(() => {
                if(!localStorage.getItem('channel_task_done')) {
                    addBalance(0.0012);
                    localStorage.setItem('channel_task_done', 'true');
                    alert("تمت المهمة بنجاح! تم إضافة المكافأة.");
                } else {
                    alert("لقد قمت بهذه المهمة مسبقاً.");
                }
            }, 2000);
        }

        function addBalance(amount) {
            balance += amount;
            localStorage.setItem('vitas_user_balance', balance);
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(4);
            const wBtn = document.getElementById('withdrawBtn');
            if (balance >= targetWithdraw) {
                wBtn.classList.add('active');
                wBtn.innerText = "اسحب أرباحك الآن!";
            }
        }

        function checkWithdraw() {
            if (balance < targetWithdraw) {
                alert("عذراً، تحتاج لجمع 2 دولار للسحب.");
            } else {
                alert("تم إرسال طلب السحب للمراجعة.");
            }
        }
    </script>
</body>
</html>
