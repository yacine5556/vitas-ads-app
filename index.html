<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Ads - Referral System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://static.onclicka.com/js/onclicka.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #0b0e11; --card: #1c2128; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); border-radius: 18px; padding: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #30363d; margin-bottom: 15px; }
        .balance-amount { font-size: 38px; font-weight: bold; color: var(--primary); margin-bottom: 15px; }
        .main-btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; }
        .invite-btn { background: #ffffff; color: #000; margin-top: 10px; }
        .user-id-tag { font-size: 11px; color: #8b949e; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div style="font-size: 14px; color: #aaa;">رصيدك الحالي</div>
        <div id="balance" class="balance-amount">0.0000</div>
        <button id="adBtn" class="main-btn">شاهد إعلان واربح 📺</button>
    </div>

    <div class="card">
        <p style="font-size: 14px; font-weight: bold;">نظام الإحالة الفريد</p>
        <p style="font-size: 12px; color: #aaa; margin-bottom: 15px;">كل شخص يدخل عبر رابطك سيزيد من أرباحك!</p>
        <button onclick="shareReferral()" class="main-btn invite-btn">مشاركة رابط الإحالة الخاص بي 🔗</button>
        <div id="userIdDisplay" class="user-id-tag"></div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand(); // لفتح التطبيق بكامل الشاشة

        let balance = parseFloat(localStorage.getItem('vitas_user_balance')) || 0;
        document.getElementById('balance').innerText = balance.toFixed(4);

        // الحصول على ID المستخدم من تليجرام
        const userId = tele.initDataUnsafe?.user?.id || "guest";
        if(userId !== "guest") {
            document.getElementById('userIdDisplay').innerText = "معرف الإحالة الخاص بك: " + userId;
        }

        function shareReferral() {
            const botUsername = "VitasEarnAds_bot";
            
            // إنشاء رابط إحالة يحتوي على ID المستخدم
            // الرابط سيكون بهذا الشكل: https://t.me/VitasEarnAds_bot?start=12345678
            const referralLink = `https://t.me/${botUsername}?start=${userId}`;
            
            const text = encodeURIComponent("ادخل جرب هذا البوت لربح المال من الإعلانات! السحب مضمون 💰📺");
            const shareUrl = `https://t.me/share/url?url=${referralLink}&text=${text}`;
            
            window.location.href = shareUrl;
        }

        document.getElementById('adBtn').onclick = function() {
            if (window.onclicka) { 
                window.onclicka('show', { zoneId: 436685 }); 
            } else { 
                alert("جاري تجهيز الإعلان..."); 
            }
        };

        window.onclicka('onAdCompleted', () => {
            balance += 0.0010;
            localStorage.setItem('vitas_user_balance', balance);
            document.getElementById('balance').innerText = balance.toFixed(4);
            tele.HapticFeedback.notificationOccurred('success'); // اهتزاز خفيف عند الربح
        });
    </script>
</body>
</html>
