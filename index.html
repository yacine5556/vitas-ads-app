<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Gold Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://js.onclckmn.com/static/onclicka.js" data-admpid="437222"></script>

    <style>
        body { background-color: #0f172a; color: white; font-family: 'Cairo', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .reward-btn { background: linear-gradient(90deg, #10b981, #059669); transition: 0.3s; }
        .task-icon { background: rgba(51, 65, 85, 0.5); border-radius: 16px; width: 50px; height: 50px; display: flex; items-center: center; justify-content: center; }
    </style>
</head>
<body class="p-5">

    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-2 bg-slate-800/80 px-4 py-2 rounded-full border border-slate-700">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-green-400 font-bold" id="balance">0.009</span>
            <span class="text-[10px] text-slate-400">TON</span>
        </div>
        <div class="text-right">
            <h1 class="text-lg font-black tracking-tighter">VITAS GOLD <span class="text-green-500 text-xs">PRO</span></h1>
        </div>
    </div>

    <h2 class="text-sm font-bold mb-5 text-slate-400 px-2 text-right">مركز المهام المربحة</h2>

    <div class="space-y-4">
        
        <div class="glass-card p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="task-icon text-2xl">⚡</div>
                <div>
                    <h3 class="text-xs font-bold">إعلانات سريعة</h3>
                    <p class="text-[10px] text-green-500" id="stat-1">1/20 إعلان</p>
                </div>
            </div>
            <button onclick="runAd('onclicka')" class="reward-btn px-5 py-2 rounded-xl text-[10px] font-black shadow-lg active:scale-90">فتح 💰</button>
        </div>

        <div class="glass-card p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="task-icon text-2xl">💎</div>
                <div>
                    <h3 class="text-xs font-bold">إعلانات VIP</h3>
                    <p class="text-[10px] text-purple-400">ربح مضاعف</p>
                </div>
            </div>
            <button onclick="runAd('direct')" class="bg-purple-600 px-5 py-2 rounded-xl text-[10px] font-black shadow-lg active:scale-90">فتح 🚀</button>
        </div>

    </div>

    <div class="mt-10 p-4 bg-yellow-500/10 border border-yellow-500/20 rounded-2xl text-[10px] text-yellow-500 text-center">
        ملاحظة: يجب مشاهدة الإعلان لنهايته لضمان احتساب الرصيد.
    </div>

    <script>
        let balance = 0.009;
        let count1 = 1;

        function runAd(type) {
            if (type === 'onclicka') {
                if (window.onclicka) {
                    window.onclicka.show('popunder');
                } else {
                    window.open('https://js.onclckmn.com/static/onclicka.js?data-admpid=437222', '_blank');
                }
                
                // تحديث العداد
                if (count1 < 20) {
                    count1++;
                    document.getElementById('stat-1').innerText = count1 + "/20 إعلان";
                } else {
                    balance += 0.001;
                    document.getElementById('balance').innerText = balance.toFixed(3);
                    count1 = 0;
                    alert("تهانينا! حصلت على مكافأة 0.001 TON");
                }
            } else {
                // هنا تضع رابط Adsterra أو Monetag المباشر
                window.open('https://www.google.com', '_blank'); 
            }
        }
    </script>
</body>
</html>
