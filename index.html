<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vitas Ads</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0b0e11; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1c2128; border-radius: 20px; padding: 25px; border: 1px solid #444c56; width: 80%; text-align: center; }
        .balance { font-size: 35px; color: #2eb67d; margin: 15px 0; font-weight: bold; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 18px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin:0">💰 رصيدك</h2>
        <div class="balance">0.00 TON</div>
        <p style="color:#8b949e">شاهد الإعلانات لزيادة أرباحك</p>
        <button class="btn" onclick="showAd()">اضغط للمشاهدة 📺</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function showAd() { alert("تم تحديث الواجهة بنجاح! الآن سنربط الإعلانات الحقيقية."); }
    </script>
</body>
</html>
