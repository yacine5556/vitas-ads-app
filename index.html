<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Earn Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://static.onclicka.com/js/onclicka.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #0b0e11; --card: #1c2128; --text: #ffffff; --green: #4cd964; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); border-radius: 18px; padding: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #30363d; margin-bottom: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .balance-label { font-size: 14px; color: #8b949e; margin-bottom: 8px; }
        .balance-amount { font-size: 38px; font-weight: 800; color: var(--primary); margin-bottom: 15px; }
        .main-btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .main-btn:active { transform: scale(0.98); }
        .task-box { background: #2d333b; border-radius: 14px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid #444c56; }
        .task-txt { font-weight: 600; font-size: 15px; }
        .task-price { color: var(--green); font-size: 12px; display: block; }
        .small-btn { background: #0088cc; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: 600; }
        .invite-section { background: #ffffff; color: #000; margin-top: 10px; }
        .section-header { width: 100%; text-align: right; font-size: 14px; color: #8b949e; margin: 15px 5px 8px 0; }
        .withdraw-btn { background: #30363d; color: #8b949e; cursor: not-allowed; }
        .withdraw-btn.active { background: var(--green); color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <div class="balance-label">الرصيد القابل للسحب</div>
        <div id="balance" class="balance-amount">0.0000</div>
        <button id="adBtn" class="main-btn">شاهد إعلان واربح الآن 📺</button>
    </div>

    <div class="section-header">مهام سريعة</div>
    <div style="width: 100%; max-width: 440px;">
        <div class="task-box">
            <div>
                <span class="task-txt">متابعة قناتنا</span>
                <span class="task-price">+0.0012$ مكافأة</span>
            </div>
            <button onclick="doTask()" class="small-btn">انضمام</button>
        </div>
    </div>

    <div class="section-header">نظام الإحالة</div>
    <div class="card" style="padding: 15px;">
        <p style="font-size: 13px; margin-bottom: 12px; color: #aaa;">اربح عمولة عن كل صديق يستخدم البوت الخاص بك!</p>
        <button onclick="inviteFriends()" class="main-btn invite-section">دعوة الأصدقاء 🔗</button>
    </div>

    <div class="section-header">المال والأرباح</div>
    <div class="card">
        <p style="font-size: 12px; color: #8b949e; margin-bottom: 10px;">الحد الأدنى للسحب: 2.00$</p>
        <button id="withdrawBtn" onclick="checkWithdraw()" class="main-btn withdraw-btn">طلب سحب الأرباح 💸</button>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('vitas_user_balance')) || 0;
        const targetWithdraw = 2.00;
        updateUI();

        // إعدادات الإعلانات
        const adConfig = { zoneId: 436685 };

        // وظيفة الإعلانات
        document.getElementById('adBtn').onclick = function() {
            if (window.onclicka) {
                window.onclicka('show', adConfig);
            } else {
                alert("الإعلانات قيد التفعيل.. حاول بعد دقائق.");
            }
        };

        window.onclicka('onAdCompleted', () => {
            addBalance(0.0010);
        });

        // وظيفة المهمة
        function doTask() {
            const channel = 'https://t.me/fotgy';
            window.open(channel, '_blank');
            setTimeout(() => {
                if(!localStorage.getItem('task_fotgy_done')) {
                    addBalance(0.0012);
                    localStorage.setItem('task_fotgy_done', 'true');
                    alert("أحسنت! تمت إضافة المكافأة.");
                } else {
                    alert("لقد حصلت على المكافأة مسبقاً.");
                }
            }, 2500);
        }

        // وظيفة الدعوة
        function inviteFriends() {
            const botLink = 'https://t.me/VTCBot';
            const text = 'اكسب الدولارات مجاناً من هذا البوت! جربه الآن: https://vitas-ads-app.vercel.app/';
            const url = `https://t.me/share/url?url=${encodeURIComponent(botLink)}&text=${encodeURIComponent(text)}`;
            window.location.href = url;
        }

        function addBalance(amount) {
            balance += amount;
            localStorage.setItem('vitas_user_balance', balance.toFixed(4));
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = parseFloat(balance).toFixed(4);
            const wBtn = document.getElementById('withdrawBtn');
            if (balance >= targetWithdraw) {
                wBtn.classList.add('active');
                wBtn.innerText = "اسحب أرباحك الآن!";
            }
        }

        function checkWithdraw() {
            if (balance < targetWithdraw) {
                alert("رصيدك أقل من 2 دولار.");
            } else {
                alert("تم استلام الطلب بنجاح.");
            }
        }
    </script>
</body>
</html>
