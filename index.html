<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Gold - Fixed Ads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        (function(d,z,s){
            s.src='https://js.onclckmn.com/static/onclicka.js';
            s.dataset.admpid=437222;
            d.head.appendChild(s);
        })(document,437222,document.createElement('script'));
    </script>

    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .card { background: #1e293b; border-radius: 24px; border: 1px solid #334155; }
        .btn-green { background: #16a34a; box-shadow: 0 0 20px rgba(22, 163, 74, 0.2); }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex justify-between items-center border-b border-slate-800 bg-slate-900/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center font-extrabold shadow-lg">VG</div>
            <h1 class="text-sm font-black uppercase tracking-widest">Vitas Gold</h1>
        </div>
        <div class="bg-green-900/30 px-3 py-1.5 rounded-full border border-green-500/30">
            <span class="text-xs font-bold text-green-400" id="balance">0.009</span> <span class="text-[10px] text-green-500">TON</span>
        </div>
    </header>

    <main class="p-5">
        <div class="card p-6 relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-red-600/10 rounded-2xl flex items-center justify-center text-3xl border border-red-500/20">🎥</div>
                    <div>
                        <p class="text-sm font-bold">مشاهدة إعلانات</p>
                        <p class="text-[10px] text-green-400">اربح 0.001 TON / 20 فيديو</p>
                    </div>
                </div>
                <div class="bg-slate-950 px-3 py-1 rounded-lg border border-slate-700">
                    <span class="text-sm font-black text-red-500" id="counter">0/20</span>
                </div>
            </div>

            <button onclick="triggerAd()" class="w-full btn-green text-white py-4 rounded-2xl text-sm font-black transition-all active:scale-95 shadow-xl border border-green-400/20">
                تشغيل الإعلان الحقيقي 🎬
            </button>
            <p class="text-[9px] text-center mt-4 text-slate-500">ملاحظة: إذا ظهرت أكواد برمجية، تأكد من تحديث صفحة البوت.</p>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around p-4 shadow-2xl">
        <div class="flex flex-col items-center text-green-500">
            <span class="text-2xl">💰</span>
            <span class="text-[9px] font-bold mt-1">كسب</span>
        </div>
        <div class="flex flex-col items-center text-slate-500 opacity-50">
            <span class="text-2xl">📥</span>
            <span class="text-[9px] font-bold mt-1">سحب</span>
        </div>
    </nav>

    <script>
        let balanceValue = 0.009;
        let videoCount = 0;

        function triggerAd() {
            // استدعاء الإعلان بطريقة برمجية (تجنباً لفتح صفحة الكود)
            if (typeof window.onclicka !== 'undefined') {
                window.onclicka.show('popunder'); // يحاول استدعاء النافذة المنبثقة
            } else {
                // إذا لم يتم تحميل المكتبة بعد، نفتح الرابط كاحتياط ولكن بطريقة لا تظهر الكود
                console.log("Ad library loading...");
            }

            // تحديث العداد
            if (videoCount < 20) {
                videoCount++;
                document.getElementById('counter').innerText = videoCount + "/20";
                
                if (videoCount === 20) {
                    balanceValue += 0.001;
                    document.getElementById('balance').innerText = balanceValue.toFixed(3);
                    alert("✅ أحسنت! اكتملت المهمة وتمت إضافة المكافأة.");
                    videoCount = 0;
                    document.getElementById('counter').innerText = "0/20";
                }
            }
        }
    </script>
</body>
</html>
