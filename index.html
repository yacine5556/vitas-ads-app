<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Ads Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://static.onclicka.com/js/onclicka.js"></script>
    <style>
        :root { --primary: #ffcc00; --bg: #0b0e11; --card: #1c2128; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--card); padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; border-bottom: 2px solid var(--primary); }
        .balance { font-size: 50px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .main-btn { background: var(--primary); color: #000; border: none; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: bold; width: 90%; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { text-align: center; font-size: 12px; color: #888; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 14px; color: #888;">الرصيد الحالي</div>
        <div id="balanceDisplay" class="balance">0.0000</div>
        <button id="adBtn" class="main-btn">شاهد إعلان واربح 📺</button>
    </div>

    <div style="padding: 20px; text-align: center;">
        <div style="background: var(--card); padding: 15px; border-radius: 15px;">
            <p>اربح عن طريق دعوة الأصدقاء</p>
            <button onclick="shareLink()" style="background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 10px;">دعوة 🔗</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active"><span>💰</span><br>الأرباح</div>
        <div class="nav-item" onclick="shareLink()"><span>👥</span><br>الإحالات</div>
        <div class="nav-item"><span>💳</span><br>السحب</div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        let balance = parseFloat(localStorage.getItem('vitas_balance')) || 0;
        document.getElementById('balanceDisplay').innerText = balance.toFixed(4);

        // استخدام الـ AD Code ID الجديد من صورتك الأخيرة
        const myZoneId = 436888; 

        document.getElementById('adBtn').onclick = function() {
            if (typeof window.onclicka !== 'undefined') {
                window.onclicka('show', { zoneId: myZoneId });
            } else {
                alert("جاري تحميل نظام الإعلانات... حاول مجدداً");
            }
        };

        window.onclicka('onAdCompleted', () => {
            balance += 0.0015;
            localStorage.setItem('vitas_balance', balance);
            document.getElementById('balanceDisplay').innerText = balance.toFixed(4);
            tele.HapticFeedback.notificationOccurred('success');
        });

        function shareLink() {
            const userId = tele.initDataUnsafe?.user?.id || "user";
            const url = `https://t.me/VitasEarnAds_bot?start=${userId}`;
            const text = encodeURIComponent("اكسب المال من هاتفك مجاناً! 💰");
            window.location.href = `https://t.me/share/url?url=${url}&text=${text}`;
        }
    </script>
</body>
</html>
