<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Gold - Ads Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script async src="https://js.onclckmn.com/static/onclicka.js" data-admpid="437222"></script>

    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #1e293b; border-radius: 24px; border: 1px solid #334155; }
        .btn-gold { background: linear-gradient(to right, #15803d, #16a34a); box-shadow: 0 4px 15px rgba(22, 163, 74, 0.3); }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex justify-between items-center border-b border-slate-800 bg-slate-900/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center font-bold shadow-lg">VG</div>
            <h1 class="text-sm font-black tracking-tight">VITAS GOLD</h1>
        </div>
        <div class="bg-green-900/30 px-3 py-1.5 rounded-full border border-green-500/30">
            <span class="text-xs font-bold text-green-400" id="balance">0.009</span> <span class="text-[10px] text-green-500">TON</span>
        </div>
    </header>

    <main class="p-5">
        <div id="earn-page">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <span class="text-2xl">💰</span> مركز المهام
            </h2>

            <div class="card p-6 mb-6 relative overflow-hidden">
                <div class="flex justify-between items-start mb-6">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-red-600/20 rounded-2xl flex items-center justify-center text-3xl shadow-inner border border-red-500/20">📺</div>
                        <div>
                            <p class="text-base font-bold">مشاهدة إعلانات حقيقية</p>
                            <p class="text-xs text-green-400 font-medium">اربح 0.001 TON كل 20 فيديو</p>
                        </div>
                    </div>
                    <div class="bg-slate-900 px-3 py-1 rounded-lg border border-slate-700">
                        <span class="text-sm font-black text-red-500" id="counter">0/20</span>
                    </div>
                </div>

                <button onclick="playRealVideoAd()" class="w-full btn-gold text-white py-4 rounded-2xl text-sm font-black transition-all active:scale-95 shadow-xl">
                    تشغيل الفيديو الآن 🎬
                </button>
                
                <p class="text-[10px] text-center mt-3 text-slate-500 italic">سيتم فتح الإعلان في نافذة جديدة، يرجى العودة بعد المشاهدة.</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around p-4">
        <div class="flex flex-col items-center text-green-500">
            <span class="text-2xl">💸</span>
            <span class="text-[10px] font-bold mt-1">كسب</span>
        </div>
        <div class="flex flex-col items-center text-slate-500">
            <span class="text-2xl">📥</span>
            <span class="text-[10px] font-bold mt-1">سحب</span>
        </div>
    </nav>

    <script>
        let currentBalance = 0.009;
        let currentCount = 0;

        function playRealVideoAd() {
            // 1. استدعاء الإعلان الحقيقي (Popunder) لضمان تسجيل الربح في OnClickA
            // سيقوم بفتح رابط الإعلانات الخاص بمعرفك 437222
            window.open('https://js.onclckmn.com/static/onclicka.js?data-admpid=437222', '_blank');

            // 2. تحديث عداد البوت الداخلي للمستخدم
            if (currentCount < 20) {
                currentCount++;
                document.getElementById('counter').innerText = currentCount + "/20";
                
                if (currentCount === 20) {
                    currentBalance += 0.001;
                    document.getElementById('balance').innerText = currentBalance.toFixed(3);
                    alert("🎉 أحسنت! شاهدت 20 فيديو وحصلت على المكافأة.");
                    currentCount = 0;
                    document.getElementById('counter').innerText = "0/20";
                }
            }
        }
    </script>

</body>
</html>
