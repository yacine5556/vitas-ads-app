<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Gold - Verified</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script async src="https://js.onclckmn.com/static/onclicka.js" data-admpid="437222"></script>

    <style>
        body { background-color: #0c111d; color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-custom { background: #1f2937; border-radius: 30px; border: 1px solid #374151; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn-green { background: #16a34a; box-shadow: 0 4px 15px rgba(22, 163, 74, 0.3); }
    </style>
</head>
<body class="p-6">

    <div class="flex justify-between items-center mb-10">
        <div class="bg-green-950/40 px-4 py-2 rounded-2xl border border-green-500/30 flex items-center gap-2">
            <span class="text-sm font-bold text-green-400" id="balance">0.009</span> 
            <span class="text-[10px] font-bold text-green-600 uppercase">Ton</span>
        </div>
        <div class="flex items-center gap-3">
            <span class="font-bold text-sm tracking-tight">VITAS GOLD</span>
            <div class="w-11 h-11 bg-green-600 rounded-2xl flex items-center justify-center font-black shadow-lg">VG</div>
        </div>
    </div>

    <div class="card-custom p-7 shadow-2xl relative overflow-hidden">
        <div class="flex justify-between items-center mb-10">
            <div class="bg-slate-950 px-4 py-2 rounded-xl border border-slate-700">
                <span class="text-red-500 font-black text-sm" id="counter">1/20</span>
            </div>
            <div class="text-right">
                <p class="font-black text-sm">مهمة الإعلانات</p>
                <p class="text-[10px] text-green-500">شاهد 20 فيديو / 0.001 TON</p>
            </div>
            <div class="w-16 h-16 bg-slate-800 rounded-3xl flex items-center justify-center text-4xl shadow-inner border border-slate-700">🎥</div>
        </div>

        <button onclick="startRealAd()" class="w-full btn-green py-5 rounded-3xl font-black text-xs uppercase tracking-widest transition-all active:scale-95 shadow-xl border border-green-500/20">
            فتح الإعلان المربح 💰
        </button>
    </div>

    <script>
        // الرصيد الأولي من صورتك
        let currentBalance = 0.009;
        let watchedAds = 1; // بدأنا بـ 1 من صورتك الجديدة

        function startRealAd() {
            // حل المشكلة: لا نفتح الرابط مباشرة، بل نستدعي وظيفة الإعلان من المكتبة
            if (typeof window.onclicka !== 'undefined') {
                window.onclicka.show('popunder'); // يفتح إعلان حقيقي دون مغادرة البوت
            } else {
                // إذا لم يتم تحميل المكتبة، نفتح رابط إعلان مباشر احتياطي
                // [نصيحة: احصل على Direct Link من لوحة التحكم بدلاً من رابط ملف الـ JS]
                window.open('https://js.onclckmn.com/static/onclicka.js?data-admpid=437222', '_blank');
            }

            // تحديث العداد داخلياً
            if (watchedAds < 20) {
                watchedAds++;
                document.getElementById('counter').innerText = watchedAds + "/20";
                if (watchedAds === 20) {
                    currentBalance += 0.001;
                    document.getElementById('balance').innerText = currentBalance.toFixed(3);
                    alert("✅ أحسنت! اكتملت المهمة وحصلت على 0.001 TON.");
                    watchedAds = 0;
                    document.getElementById('counter').innerText = "0/20";
                }
            }
        }
    </script>
</body>
</html>
