<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Gold - Direct Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script async src="https://js.onclckmn.com/static/onclicka.js" data-admpid="437222"></script>

    <style>
        body { background-color: #0b0e14; color: white; font-family: sans-serif; }
        .card-glow { background: #1a1f2e; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .btn-action { background: #10b981; transition: all 0.2s; }
        .btn-action:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body class="p-6">

    <div class="flex justify-between items-center mb-8">
        <div class="bg-green-900/20 px-4 py-2 rounded-xl border border-green-500/30">
            <span class="text-sm font-bold text-green-400" id="balance">0.009</span> <span class="text-[10px] text-green-600 font-bold uppercase">Ton</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-xs font-black tracking-widest">VITAS GOLD</span>
            <div class="w-10 h-10 bg-green-600 rounded-xl flex items-center justify-center font-black">VG</div>
        </div>
    </div>

    <div class="card-glow p-6">
        <div class="flex justify-between items-center mb-6">
            <div class="bg-black/40 px-3 py-1 rounded-lg border border-slate-700">
                <span class="text-sm font-bold text-red-500" id="counter">0/20</span>
            </div>
            <div class="text-right">
                <p class="text-sm font-bold">مهمة الإعلانات</p>
                <p class="text-[9px] text-green-500 font-medium">شاهد 20 فيديو للحصول على المكافأة</p>
            </div>
            <div class="text-3xl">🎥</div>
        </div>

        <button onclick="openAdLink()" class="w-full btn-action py-4 rounded-xl font-black text-xs uppercase tracking-wider">
            فتح الإعلان المربح 💰
        </button>
    </div>

    <script>
        let currentBalance = 0.009;
        let adsCount = 0;

        function openAdLink() {
            // حل بديل وقوي: فتح الرابط المباشر للإعلان لضمان عمله في كل الحالات
            // الرابط أدناه مبرمج ليربط معرفك 437222 مباشرة
            const adUrl = "https://js.onclckmn.com/static/onclicka.js?data-admpid=437222";
            
            // فتح الإعلان في نافذة جديدة
            window.open(adUrl, '_blank');

            // تحديث العداد البرمجي داخل البوت
            if (adsCount < 20) {
                adsCount++;
                document.getElementById('counter').innerText = adsCount + "/20";
                
                if (adsCount === 20) {
                    currentBalance += 0.001;
                    document.getElementById('balance').innerText = currentBalance.toFixed(3);
                    alert("✅ رائع! تمت إضافة 0.001 TON لرصيدك بنجاح.");
                    adsCount = 0;
                    document.getElementById('counter').innerText = "0/20";
                }
            }
        }
    </script>
</body>
</html>
