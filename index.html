<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Gold - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script async src="https://js.onclckmn.com/static/onclicka.js" data-admpid="437222"></script>

    <style>
        body { background-color: #f8fafc; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .nav-item.active { color: #15803d; border-top: 3px solid #15803d; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white p-4 flex justify-between items-center border-b sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-green-700 rounded-full flex items-center justify-center text-white font-bold">VG</div>
            <h1 class="text-sm font-bold text-gray-800">Vitas Gold</h1>
        </div>
        <div class="bg-green-50 px-3 py-1 rounded-full border border-green-100">
            <span class="text-xs font-bold text-green-700" id="header-balance">0.009</span> <span class="text-[10px] text-green-600">TON</span>
        </div>
    </header>

    <main class="p-4">
        <div id="earn" class="page active">
            <h2 class="text-lg font-bold mb-4 text-gray-700">مركز الأرباح</h2>

            <div class="card p-5 border-2 border-green-100 mb-6 bg-green-50/20">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg">🎥</div>
                        <div>
                            <p class="text-sm font-bold text-gray-800">فيديوهات إعلانية</p>
                            <p class="text-[10px] text-green-700 font-bold">شاهد 20 فيديو لتربح 0.001 TON</p>
                        </div>
                    </div>
                    <span class="text-xs font-black bg-white px-3 py-1 rounded-full border shadow-sm" id="v-counter">0/20</span>
                </div>
                
                <button onclick="startAdProcess()" class="w-full bg-green-700 hover:bg-green-800 text-white py-4 rounded-2xl text-xs font-bold shadow-md active:scale-95 transition-all">
                    تشغيل الفيديو الآن 🎬
                </button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-sm border-t flex justify-around p-3 z-50">
        <button class="nav-item active flex flex-col items-center w-full">
            <span class="text-xl">💰</span>
            <span class="text-[10px] font-bold">كسب</span>
        </button>
        <button class="nav-item flex flex-col items-center w-full text-gray-400">
            <span class="text-xl">💧</span>
            <span class="text-[10px] font-bold">سحب</span>
        </button>
    </nav>

    <script>
        // المتغيرات البرمجية للرصيد والعداد
        let userBalance = 0.009;
        let watchedCount = 0;

        function startAdProcess() {
            // هنا الكود يقوم بزيادة العداد عند كل نقرة تظهر فيها الإعلانات
            if (watchedCount < 20) {
                watchedCount++;
                document.getElementById('v-counter').innerText = watchedCount + "/20";
                
                if (watchedCount === 20) {
                    userBalance += 0.001;
                    document.getElementById('header-balance').innerText = userBalance.toFixed(3);
                    alert("✅ مبروك! حصلت على 0.001 TON بعد مشاهدة 20 إعلان.");
                    watchedCount = 0;
                    document.getElementById('v-counter').innerText = "0/20";
                }
            }
        }
    </script>
</body>
</html>
