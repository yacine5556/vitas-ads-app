<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Gold Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #334155; }
        .balance-card { background: rgba(30, 41, 59, 0.7); border-radius: 20px; border: 1px solid #10b981; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-8">
        <h1 class="text-xl font-bold tracking-widest">VITAS GOLD <span class="text-green-500 text-sm">PRO</span></h1>
        <div class="balance-card px-4 py-2 flex items-center gap-2">
            <span class="text-green-500 text-xs font-bold">TON</span>
            <span id="balance" class="font-mono text-lg">0.009</span>
        </div>
    </div>

    <div class="gold-gradient rounded-3xl p-6 mb-8 flex justify-between items-center">
        <div>
            <h3 class="font-bold text-lg">إعلانات VIP</h3>
            <p class="text-purple-400 text-xs font-bold italic">ربح مضاعف</p>
            <button onclick="runVipAd()" class="mt-4 bg-purple-600 hover:bg-purple-700 text-white px-8 py-2 rounded-full text-sm font-bold shadow-lg">
                فتح 🚀
            </button>
        </div>
        <div class="bg-gray-800 p-4 rounded-2xl">
            <i class="fas fa-gem text-blue-400 text-3xl"></i>
        </div>
    </div>

    <script>
        // الرصيد الابتدائي المأخوذ من صورتك
        let balance = 0.009; 

        function runVipAd() {
            // هذا هو الرابط المباشر الخاص بك من Adsterra بعد إضافة رقمك
            window.open('https://voutmous.com/4/29112603', '_blank');
            
            // تحديث الرصيد تلقائياً عند الضغط
            balance += 0.002;
            document.getElementById('balance').innerText = balance.toFixed(3);
        }
    </script>
</body>
</html>
