<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Gold</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script async src="https://js.onclckmn.com/static/onclicka.js" data-admpid="437222"></script>

    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        .gold-card { background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 28px; border: 1px solid #334155; }
        .main-btn { background: linear-gradient(to right, #16a34a, #15803d); box-shadow: 0 10px 20px rgba(22, 163, 74, 0.2); }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="pb-24">

    <header class="p-5 flex justify-between items-center border-b border-slate-800 bg-slate-900/90 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 bg-green-600 rounded-2xl flex items-center justify-center font-black shadow-lg text-lg">VG</div>
            <h1 class="text-sm font-black tracking-widest uppercase">Vitas Gold</h1>
        </div>
        <div class="bg-green-950/40 px-4 py-2 rounded-2xl border border-green-500/30 flex items-center gap-2">
            <span class="text-xs font-black text-green-400" id="user-balance">0.009</span> 
            <span class="text-[10px] font-bold text-green-600">TON</span>
        </div>
    </header>

    <main class="p-6">
        <div id="earn-section" class="page active">
            <h2 class="text-xl font-black mb-6 text-slate-300">مركز المهام المربحة</h2>

            <div class="gold-card p-6 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-red-500/10 rounded-2xl flex items-center justify-center text-3xl border border-red-500/20">🎬</div>
                        <div>
                            <p class="text-sm font-bold text-slate-100">شاهد واربح</p>
                            <p class="text-[10px] text-green-500 font-bold">0.001 TON / 20 إعلان</p>
                        </div>
                    </div>
                    <div class="bg-slate-950 px-3 py-1.5 rounded-xl border border-slate-700">
                        <span class="text-sm font-black text-red-500" id="ad-counter">0/20</span>
                    </div>
                </div>

                <button onclick="runAdvertisement()" class="w-full main-btn text-white py-4.5 rounded-2xl text-xs font-black transition-all active:scale-95 shadow-2xl">
                    مشاهدة إعلان حقيقي 💰
                </button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-slate-800 flex justify-around p-4 backdrop-blur-md">
        <div class="flex flex-col items-center text-green-500">
            <span class="text-2xl">⚡</span>
            <span class="text-[9px] font-black mt-1 uppercase">Earn</span>
        </div>
        <div class="flex flex-col items-center text-slate-600">
            <span class="text-2xl">💎</span>
            <span class="text-[9px] font-black mt-1 uppercase">Wallet</span>
        </div>
    </nav>

    <script>
        let currentBalance = 0.009;
        let adsViewed = 0;

        function runAdvertisement() {
            // محاولة استدعاء الإعلان برمجياً لضمان عدم ظهور الأكواد
            if (window.onclicka) {
                // استدعاء نافذة منبثقة حقيقية
                window.onclicka.show('popunder');
            }

            // نظام العداد البرمجي
            if (adsViewed < 20) {
                adsViewed++;
                document.getElementById('ad-counter').innerText = adsViewed + "/20";
                
                if (adsViewed === 20) {
                    currentBalance += 0.001;
                    document.getElementById('user-balance').innerText = currentBalance.toFixed(3);
                    alert("✅ ممتاز! تم إضافة 0.001 TON لرصيدك.");
                    adsViewed = 0;
                    document.getElementById('ad-counter').innerText = "0/20";
                }
            }
        }
    </script>
</body>
</html>
