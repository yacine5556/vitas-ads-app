<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Ads</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://static.onclicka.com/js/onclicka.js"></script>
    <script>
      onclicka('init', {
        zoneId: 436681
      });

      function showMyAd() {
        onclicka('show');
      }
    </script>

    <style>
        body { background-color: #0b0e11; color: #ffffff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1c2128; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 80%; }
        .balance { font-size: 35px; color: #ffcc00; margin-bottom: 20px; }
        .btn { background: #0088cc; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-ad { background: #ffcc00; color: #000; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin:0;">💰 رصيدك</h2>
        <div class="balance">0</div>
        
        <button onclick="showMyAd()" class="btn btn-ad">مشاهدة إعلان لربح مكافأة 📺</button>
        
        <button class="btn">سحب الأرباح 💸</button>
    </div>
</body>
</html>
