<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitas Ads</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://static.onclicka.com/js/onclicka.js"></script>
    
    <style>
        body { background-color: #0b0e11; color: #ffffff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1c2128; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 85%; }
        .balance-box { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .balance { font-size: 35px; color: #ffcc00; font-weight: bold; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }
        .btn-ad { background: linear-gradient(45deg, #ffcc00, #ffa500); color: #000; box-shadow: 0 4px 10px rgba(255, 204, 0, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="balance-box">
            <h2 style="margin:0; font-size: 18px;">💰 رصيدك الحالي</h2>
            <div class="balance" id="userBalance">0.00</div>
        </div>
        
        <button id="adBtn" class="btn btn-ad">مشاهدة إعلان لربح مكافأة 📺</button>
        
        <button class="btn">سحب الأرباح 💸</button>
    </div>

    <script>
        // تهيئة الإعلانات باستخدام رقم الزون الخاص بك
        onclicka('init', {
            zoneId: 436681
        });

        document.getElementById('adBtn').onclick = function() {
            // محاولة إظهار الإعلان
            onclicka('show');
            
            // تجربة إضافية للتأكد من استجابة النظام
            console.log("Ad request sent for zone 436681");
        };
    </script>
</body>
</html>
